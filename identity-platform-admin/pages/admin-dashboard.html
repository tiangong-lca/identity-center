  @theme inline {

    <!-- ===== TOP NAV ===== -->
    <header style="height: 48px; background-color: var(--color-background); border-bottom: 1px solid var(--color-border); position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; padding: 0 16px;">
      <!-- Left: hamburger + logo -->
      <div style="display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
        <button data-dom-id="btn-hamburger" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); color: var(--color-on-surface-variant);" aria-label="菜单">
          <i data-lucide="menu" style="width: 20px; height: 20px;"></i>
        </button>
        <span style="font-size: 15px; font-weight: 600; color: var(--color-foreground); white-space: nowrap;">Identity Platform</span>
      </div>

      <!-- Right: search + icons + avatar -->
      <div style="margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
        <!-- Search box -->
        <div style="width: 200px; height: 32px; display: flex; align-items: center; gap: 8px; padding: 0 10px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background-color: var(--color-surface-container-low);">
          <i data-lucide="search" style="width: 14px; height: 14px; color: var(--color-muted-foreground); flex-shrink: 0;"></i>
          <input type="text" placeholder="搜索" style="border: none; outline: none; background: none; font-size: 13px; color: var(--color-foreground); width: 100%; font-family: var(--font-family-base);" />
        </div>
        <!-- Notification bell -->
        <button data-dom-id="btn-notification" style="position: relative; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); color: var(--color-on-surface-variant);" aria-label="通知">
          <i data-lucide="bell" style="width: 18px; height: 18px;"></i>
          <span style="position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background-color: var(--color-danger); border-radius: 50%; border: 1.5px solid var(--color-background);"></span>
        </button>
        <!-- Help icon -->
        <button data-dom-id="btn-help" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); color: var(--color-on-surface-variant);" aria-label="帮助">
          <i data-lucide="help-circle" style="width: 18px; height: 18px;"></i>
        </button>
        <!-- Avatar -->
        <div data-dom-id="avatar-menu" style="width: 32px; height: 32px; border-radius: var(--radius-full); background-color: var(--color-primary-container); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--color-primary);">A</div>
      </div>
    </header>
