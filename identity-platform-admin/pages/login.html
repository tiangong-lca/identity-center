  @theme inline {
    --color-background: var(--foundation-background);

    --color-card-foreground: var(--text-foreground);

    --color-accent-foreground: var(--primary-accent-foreground);

    --color-destructive-foreground: #ffffff;
    --color-border: var(--foundation-border);
    --color-input: var(--foundation-border);
    --color-ring: var(--primary-ring);
    --color-chart-1: var(--primary);
    --color-chart-2: var(--status-success);
    --color-chart-3: var(--status-warning);
    --color-chart-4: var(--status-danger);
    --color-chart-5: var(--text-muted-foreground);
    --color-sidebar: var(--foundation-surface-dim);
    --color-sidebar-foreground: var(--text-foreground);
    --color-sidebar-primary: var(--primary);
    --color-sidebar-primary-foreground: #ffffff;
    --color-sidebar-accent: var(--foundation-surface-container);
    --color-sidebar-accent-foreground: var(--text-secondary-foreground);
    --radius-sm: var(--radius-sm);
    --radius-md: var(--radius-md);
    --radius-lg: var(--radius-lg);
    --radius-xl: var(--radius-xl);
  }

  @layer base {
    body { background: var(--foundation-background); color: var(--text-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }

    <main class="flex min-h-screen">
      <!-- Left Panel (60%) — Decorative Brand Panel -->
      <div class="hidden lg:flex lg:w-[60%] relative flex-col justify-between overflow-hidden" style="background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 50%, #003ACC 100%);">

        <!-- Particle network canvas -->
        <canvas id="particle-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

        <!-- Top-left logo/title -->
        <div class="relative z-10 px-10 pt-10">
          <span class="font-semibold text-white" style="font-size:28px;line-height:36px;letter-spacing:-0.02em;">Identity Platform</span>
        </div>

        <!-- Center content -->
        <div class="relative z-10 flex flex-col items-center px-10">
          <!-- Security lock icon (CSS-only, elegant) -->
          <div class="flex items-center justify-center" style="width:100px;height:100px;opacity:0.25;">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
              <!-- Outer ring -->
              <circle cx="50" cy="50" r="46" stroke="white" stroke-width="1.2" opacity="0.5"/>
              <circle cx="50" cy="50" r="38" stroke="white" stroke-width="0.6" opacity="0.25" stroke-dasharray="4 6"/>
              <!-- Lock body -->
              <rect x="30" y="46" width="40" height="30" rx="4" fill="white" opacity="0.9"/>
              <!-- Lock shackle -->
              <path d="M36 46 V36 C36 28.268 42.268 22 50 22 C57.732 22 64 28.268 64 36 V46" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9"/>
              <!-- Keyhole -->
              <circle cx="50" cy="58" r="5" fill="rgba(18,90,250,0.6)"/>
              <rect x="48.5" y="58" width="3" height="8" rx="1" fill="rgba(18,90,250,0.6)"/>
              <!-- Decorative dots on outer ring -->
              <circle cx="50" cy="4" r="1.8" fill="white" opacity="0.6"/>
              <circle cx="96" cy="50" r="1.8" fill="white" opacity="0.6"/>
              <circle cx="50" cy="96" r="1.8" fill="white" opacity="0.6"/>
              <circle cx="4" cy="50" r="1.8" fill="white" opacity="0.6"/>
            </svg>
          </div>

          <!-- Tagline -->
          <p class="mt-6 text-white text-center" style="font-size:18px;line-height:1.5;font-weight:500;opacity:0.9;letter-spacing:0.04em;">统一身份管理平台</p>

          <!-- Feature highlights row -->
          <div class="flex items-center gap-8 mt-8">
            <!-- 单点登录 -->
            <div class="flex items-center gap-2" style="opacity:0.75;">
              <div class="flex items-center justify-center" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.12);">
                <i data-lucide="key" class="w-4 h-4 text-white"></i>

              <span class="text-white whitespace-nowrap" style="font-size:13px;">单点登录</span>
            </div>
            <!-- 多因素认证 -->

                <i data-lucide="shield" class="w-4 h-4 text-white"></i>
              </div>
              <span class="text-white whitespace-nowrap" style="font-size:13px;">多因素认证</span>

            <span data-icon class="w-8 h-8" style="-webkit-mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/auth.svg'); mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/auth.svg'); background-color: var(--color-primary);"></span>

          <!-- Welcome title -->
          <h1 class="font-semibold" style="font-size:24px;line-height:32px;color:var(--color-foreground);text-wrap:balance;word-break:keep-all;">欢迎回来</h1>
          <p class="mt-2" style="font-size:14px;color:var(--color-muted-foreground);line-height:1.5;">登录您的账号以继续</p>

          <!-- Email input -->
          <div class="mt-8">
            <label for="login-email" class="block mb-1.5 font-medium" style="font-size:13px;color:var(--color-on-surface-variant);">邮箱地址</label>
            <input id="login-email" type="email" placeholder="请输入邮箱地址" autocomplete="email" class="w-full outline-none transition-shadow duration-150" style="height:36px;padding:0 12px;font-size:14px;color:var(--color-foreground);background:var(--color-card);box-shadow:inset 0 0 0 1px var(--color-border);border-radius:4px;" onfocus="this.style.boxShadow='inset 0 0 0 1px var(--color-primary)'" onblur="this.style.boxShadow=this.dataset.touched&&this.value===''?'inset 0 0 0 1px var(--color-error)':'inset 0 0 0 1px var(--color-border)'" oninput="delete this.dataset.touched">
          </div>

          <!-- Password input -->
          <div class="mt-4">
            <label for="login-password" class="block mb-1.5 font-medium" style="font-size:13px;color:var(--color-on-surface-variant);">密码</label>
            <div class="relative">
              <input id="login-password" type="password" placeholder="请输入密码" autocomplete="current-password" class="w-full outline-none transition-shadow duration-150" style="height:36px;padding:0 36px 0 12px;font-size:14px;color:var(--color-foreground);background:var(--color-card);box-shadow:inset 0 0 0 1px var(--color-border);border-radius:4px;" onfocus="this.style.boxShadow='inset 0 0 0 1px var(--color-primary)'" onblur="this.style.boxShadow=this.dataset.touched&&this.value===''?'inset 0 0 0 1px var(--color-error)':'inset 0 0 0 1px var(--color-border)'" oninput="delete this.dataset.touched">
              <button type="button" aria-label="显示密码" class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center justify-center" style="width:24px;height:24px;color:var(--color-muted-foreground);" onclick="const p=this.previousElementSibling;const show=p.type==='password';p.type=show?'text':'password';this.setAttribute('aria-label',show?'隐藏密码':'显示密码');">
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <!-- Remember me + Forgot password -->
          <div class="flex items-center justify-between mt-4">
            <label class="flex items-center gap-2 cursor-pointer" style="font-size:13px;color:var(--color-foreground);">
              <input type="checkbox" class="rounded-sm" style="accent-color:var(--color-primary);width:14px;height:14px;">
              <span>记住我</span>
            </label>
            <a href="#" class="transition-opacity duration-150 hover:opacity-80 whitespace-nowrap" style="font-size:13px;color:var(--color-primary);">忘记密码?</a>
          </div>

          <!-- Login button -->
          <button type="button" class="mt-6 w-full font-medium whitespace-nowrap flex items-center justify-center transition-colors duration-150 active:scale-[0.99]" style="height:36px;font-size:14px;background:var(--color-primary);color:var(--color-on-primary);border-radius:4px;" onmouseenter="this.style.background='var(--color-primary-hover)'" onmouseleave="this.style.background='var(--color-primary)'" data-dom-id="btn-login">
            登 录
          </button>

          <!-- Divider -->
          <div class="flex items-center gap-3 mt-6">

            <span class="whitespace-nowrap" style="font-size:12px;color:var(--color-muted-foreground);">或使用以下方式登录</span>
            <div class="flex-1" style="border-top:1px solid var(--color-border);"></div>

          <!-- SSO buttons -->
          <div class="flex gap-3 mt-4">
            <button type="button" class="flex-1 font-medium whitespace-nowrap flex items-center justify-center transition-colors duration-150 active:scale-[0.99]" style="height:36px;font-size:13px;background:transparent;color:var(--color-primary);box-shadow:inset 0 0 0 1px var(--color-border);border-radius:4px;" onmouseenter="this.style.background='var(--state-hover)'" onmouseleave="this.style.background='transparent'" data-dom-id="btn-sso">
              企业 SSO
            </button>
            <button type="button" class="flex-1 font-medium whitespace-nowrap flex items-center justify-center transition-colors duration-150 active:scale-[0.99]" style="height:36px;font-size:13px;background:transparent;color:var(--color-primary);box-shadow:inset 0 0 0 1px var(--color-border);border-radius:4px;" onmouseenter="this.style.background='var(--state-hover)'" onmouseleave="this.style.background='transparent'" data-dom-id="btn-ldap">
              LDAP
            </button>

              GitHub

          </p>

    </main>
    <script>
    (function() {
      var canvas = document.getElementById('particle-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var panel = canvas.parentElement;
      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var particles = [];
      var mouse = { x: -9999, y: -9999 };
      var PARTICLE_COUNT = 100;
      var CONNECTION_DIST = 150;
      var HUB_CONNECTION_DIST = 200;
      var MOUSE_REPEL_DIST = 120;
      var MOUSE_REPEL_FORCE = 2.5;
      var dpr = window.devicePixelRatio || 1;
      var W = 0, H = 0;
      var animId = null;

      function resize() {
        var rect = panel.getBoundingClientRect();
        W = rect.width;
        H = rect.height;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function createParticles() {
        particles = [];
        var hubCount = 8;
        for (var i = 0; i < PARTICLE_COUNT; i++) {
          var isHub = i < hubCount;
          particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * (isHub ? 0.15 : 0.35),
            vy: (Math.random() - 0.5) * (isHub ? 0.15 : 0.35),
            r: isHub ? (3 + Math.random()) : (1 + Math.random() * 1.5),
            hub: isHub,
            opacity: isHub ? (0.5 + Math.random() * 0.3) : (0.25 + Math.random() * 0.35)
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Draw connections
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var a = particles[i], b = particles[j];
            var dx = a.x - b.x, dy = a.y - b.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var threshold = (a.hub || b.hub) ? HUB_CONNECTION_DIST : CONNECTION_DIST;
            if (dist < threshold) {
              var alpha = (1 - dist / threshold) * 0.2;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
              ctx.lineWidth = (a.hub && b.hub) ? 0.8 : 0.5;
              ctx.stroke();
            }
          }
        }

        // Draw particles
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + p.opacity + ')';
          ctx.fill();
        }
      }

      function update() {
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];

          // Mouse repulsion
          var dx = p.x - mouse.x, dy = p.y - mouse.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MOUSE_REPEL_DIST && dist > 0) {
            var force = (1 - dist / MOUSE_REPEL_DIST) * MOUSE_REPEL_FORCE;
            p.vx += (dx / dist) * force * 0.1;
            p.vy += (dy / dist) * force * 0.1;
          }

          // Damping
          p.vx *= 0.99;
          p.vy *= 0.99;

          // Move
          p.x += p.vx;
          p.y += p.vy;

          // Wrap around edges
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;
          if (p.y < -10) p.y = H + 10;
          if (p.y > H + 10) p.y = -10;
        }
      }

      function animate() {
        update();
        draw();
        animId = requestAnimationFrame(animate);
      }

      // Mouse tracking on the left panel
      function onMouseMove(e) {
        var rect = panel.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      }
      function onMouseLeave() {
        mouse.x = -9999;
        mouse.y = -9999;
      }
      panel.addEventListener('mousemove', onMouseMove);
      panel.addEventListener('mouseleave', onMouseLeave);

      // Handle resize
      var resizeTimer = null;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          resize();
        }, 100);
      });

      // Init
      resize();
      createParticles();

      if (reducedMotion) {
        // Static render — no animation loop
        draw();
      } else {
        animate();
      }
    })();
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
