    <!-- ===== TOP NAV (same as account-profile.html) ===== -->
    <header style="height: 48px; background-color: var(--color-background); border-bottom: 1px solid var(--color-border); position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; padding: 0 16px;">

      <div style="display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
        <button data-dom-id="btn-hamburger" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); color: var(--color-on-surface-variant);" aria-label="菜单">

        </button>
        <span style="font-size: 15px; font-weight: 600; color: var(--color-foreground); white-space: nowrap;">Identity Platform</span>
      </div>

      <!-- Right: search + icons + avatar -->
      <div style="margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
        <div style="width: 200px; height: 32px; display: flex; align-items: center; gap: 8px; padding: 0 10px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background-color: var(--color-surface-container-low);">

          <input type="text" placeholder="搜索" style="border: none; outline: none; background: none; font-size: 13px; color: var(--color-foreground); width: 100%; font-family: var(--font-family-base);" />
        </div>
        <button data-dom-id="btn-notification" style="position: relative; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); color: var(--color-on-surface-variant);" aria-label="通知">

          <span style="position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background-color: var(--color-danger); border-radius: 50%; border: 1.5px solid var(--color-background);"></span>

        <!-- 我的资料 -->
        <a data-nav-key="profile" href="#" class="sidebar-nav-item" style="display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin: 0 8px; border-radius: var(--radius-md); color: var(--color-on-surface-variant); text-decoration: none; font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; transition: background-color 120ms cubic-bezier(.2,.8,.2,1);">
          <span data-icon class="w-4 h-4 shrink-0" style="-webkit-mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/account.svg'); mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/account.svg');"></span>
          <span class="sidebar-label">我的资料</span>
        </a>
        <!-- 安全设置 (active) -->
        <a data-nav-key="security" href="#" class="sidebar-nav-item" style="display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin: 0 8px; border-radius: var(--radius-md); background-color: var(--color-primary-container); color: var(--color-primary); font-weight: 500; text-decoration: none; font-size: 13px; white-space: nowrap; overflow: hidden; transition: background-color 120ms cubic-bezier(.2,.8,.2,1);">
          <span data-icon class="w-4 h-4 shrink-0" style="-webkit-mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/key.svg'); mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/key.svg');"></span>
          <span class="sidebar-label">安全设置</span>
        </a>
        <!-- 登录会话 -->
        <a data-nav-key="sessions" href="#" class="sidebar-nav-item" style="display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin: 0 8px; border-radius: var(--radius-md); color: var(--color-on-surface-variant); text-decoration: none; font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; transition: background-color 120ms cubic-bezier(.2,.8,.2,1);">
          <span data-icon class="w-4 h-4 shrink-0" style="-webkit-mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/desktop.svg'); mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/desktop.svg');"></span>
          <span class="sidebar-label">登录会话</span>
        </a>
        <!-- 已授权应用 -->
        <a data-nav-key="apps" href="#" class="sidebar-nav-item" style="display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin: 0 8px; border-radius: var(--radius-md); color: var(--color-on-surface-variant); text-decoration: none; font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; transition: background-color 120ms cubic-bezier(.2,.8,.2,1);">
          <span data-icon class="w-4 h-4 shrink-0" style="-webkit-mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/apps.svg'); mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/apps.svg');"></span>
          <span class="sidebar-label">已授权应用</span>
        </a>
        <!-- 通知中心 -->
        <a data-nav-key="notifications" href="#" class="sidebar-nav-item" style="display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin: 0 8px; border-radius: var(--radius-md); color: var(--color-on-surface-variant); text-decoration: none; font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; transition: background-color 120ms cubic-bezier(.2,.8,.2,1);">
          <span data-icon class="w-4 h-4 shrink-0" style="-webkit-mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/alarm.svg'); mask-image: url('../assets/icons/Y2JIZFT9CG4WDK/alarm.svg');"></span>
          <span class="sidebar-label">通知中心</span>
        </a>
      </nav>
      <!-- Collapse toggle -->
      <div style="padding: 12px 8px 0; margin-top: auto;">
        <button id="sidebar-toggle" onclick="toggleSidebar()" style="display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 16px; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); color: var(--color-muted-foreground); font-size: 13px; white-space: nowrap; overflow: hidden; transition: background-color 120ms;" onmouseenter="this.style.backgroundColor='var(--color-primary-container)'" onmouseleave="this.style.backgroundColor='transparent'">
          <i data-lucide="panel-left-close" class="w-4 h-4 shrink-0"></i>
          <span class="sidebar-label">收起菜单</span>
        </button>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main style="margin-top: 48px; margin-left: 200px; padding: 32px; min-height: calc(100vh - 48px); background-color: var(--color-background);">

      <!-- PageHeader -->
      <div style="margin-bottom: 32px;">
        <h1 style="font-size: 18px; font-weight: 500; color: var(--color-foreground); line-height: 26px; margin: 0; text-wrap: balance; word-break: keep-all;">安全设置</h1>
      </div>

      <!-- Content area -->
      <div style="max-width: 800px;">

        <!-- Section 1: 多因素认证 (MFA) -->
        <div style="background-color: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 24px;">
          <h2 style="font-size: 16px; font-weight: 500; color: var(--color-foreground); line-height: 24px; margin: 0 0 20px 0;">多因素认证 (MFA)</h2>

          <!-- MFA Status row -->
          <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 13px; color: var(--color-muted-foreground);">MFA 状态</span>
              <span style="display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: var(--radius-md); font-size: 12px; font-weight: 500; background-color: var(--status-identitySuccess-2); color: var(--color-success);">
                <i data-lucide="check-circle" style="width: 12px; height: 12px;"></i>
                已启用
              </span>
            </div>
            <button data-dom-id="btn-disable-mfa" style="font-size: 13px; color: var(--color-danger); background: none; border: none; cursor: pointer; padding: 0; font-family: var(--font-family-base); text-decoration: underline; text-underline-offset: 2px;">关闭 MFA</button>
          </div>

          <!-- Current method -->
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
            <span style="font-size: 13px; color: var(--color-muted-foreground);">认证方式:</span>
            <span style="font-size: 13px; color: var(--color-foreground);">TOTP 应用 (Google Authenticator)</span>
          </div>

          <!-- Actions -->
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
            <button data-dom-id="btn-change-mfa-method" style="display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background-color: var(--color-card); color: var(--color-foreground); font-size: 13px; font-weight: 400; cursor: pointer; font-family: var(--font-family-base); transition: background-color 120ms cubic-bezier(.2,.8,.2,1);">
              <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i>
              更换认证方式
            </button>
          </div>

          <!-- Recovery codes -->
          <div style="display: flex; align-items: center; gap: 8px; padding-top: 16px; border-top: 1px solid var(--color-border);">
            <i data-lucide="key" style="width: 14px; height: 14px; color: var(--color-muted-foreground); flex-shrink: 0;"></i>
            <span style="font-size: 13px; color: var(--color-muted-foreground);">备用恢复码:</span>
            <span style="font-size: 13px; color: var(--color-foreground);">已生成 10 个</span>
            <button data-dom-id="btn-view-recovery" style="font-size: 13px; color: var(--color-primary); background: none; border: none; cursor: pointer; padding: 0; font-family: var(--font-family-base); text-decoration: underline; text-underline-offset: 2px; margin-left: 8px;">查看恢复码</button>
          </div>
        </div>

        <!-- Section 2: 修改密码 -->
        <div style="background-color: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 24px;">
          <h2 style="font-size: 16px; font-weight: 500; color: var(--color-foreground); line-height: 24px; margin: 0 0 20px 0;">修改密码</h2>

          <!-- Current password -->
          <div style="margin-bottom: 16px;">
            <label for="current-password" style="display: block; font-size: 12px; color: var(--color-muted-foreground); line-height: 18px; margin-bottom: 6px;">当前密码</label>
            <div style="position: relative;">
              <input id="current-password" type="password" placeholder="输入当前密码" style="width: 100%; height: 32px; padding: 0 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background-color: var(--color-background); font-size: 13px; color: var(--color-foreground); font-family: var(--font-family-base); outline: none; box-shadow: 0 0 0 0 transparent; transition: border-color 120ms cubic-bezier(.2,.8,.2,1), box-shadow 120ms cubic-bezier(.2,.8,.2,1);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 2px var(--state-focus)';" onblur="this.style.borderColor='var(--color-border)'; this.style.boxShadow='0 0 0 0 transparent';" />
            </div>
          </div>

          <!-- New password -->
          <div style="margin-bottom: 16px;">
            <label for="new-password" style="display: block; font-size: 12px; color: var(--color-muted-foreground); line-height: 18px; margin-bottom: 6px;">新密码</label>
            <div style="position: relative;">
              <input id="new-password" type="password" placeholder="输入新密码" style="width: 100%; height: 32px; padding: 0 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background-color: var(--color-background); font-size: 13px; color: var(--color-foreground); font-family: var(--font-family-base); outline: none; box-shadow: 0 0 0 0 transparent; transition: border-color 120ms cubic-bezier(.2,.8,.2,1), box-shadow 120ms cubic-bezier(.2,.8,.2,1);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 2px var(--state-focus)';" onblur="this.style.borderColor='var(--color-border)'; this.style.boxShadow='0 0 0 0 transparent';" />
            </div>
            <!-- Password strength indicator -->
            <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
              <div style="flex: 1; height: 3px; border-radius: var(--radius-full); background-color: var(--color-outline-variant); overflow: hidden;">
                <div id="strength-bar" style="width: 66%; height: 100%; background-color: var(--color-warning); border-radius: var(--radius-full); transition: width 240ms cubic-bezier(.3,0,0,1), background-color 240ms cubic-bezier(.3,0,0,1);"></div>
              </div>
              <span id="strength-text" style="font-size: 12px; color: var(--color-warning); font-weight: 500; white-space: nowrap;">中</span>
            </div>
          </div>

          <!-- Confirm new password -->
          <div style="margin-bottom: 20px;">
            <label for="confirm-password" style="display: block; font-size: 12px; color: var(--color-muted-foreground); line-height: 18px; margin-bottom: 6px;">确认新密码</label>
            <div style="position: relative;">
              <input id="confirm-password" type="password" placeholder="再次输入新密码" style="width: 100%; height: 32px; padding: 0 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background-color: var(--color-background); font-size: 13px; color: var(--color-foreground); font-family: var(--font-family-base); outline: none; box-shadow: 0 0 0 0 transparent; transition: border-color 120ms cubic-bezier(.2,.8,.2,1), box-shadow 120ms cubic-bezier(.2,.8,.2,1);" onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 2px var(--state-focus)';" onblur="this.style.borderColor='var(--color-border)'; this.style.boxShadow='0 0 0 0 transparent';" />
            </div>
          </div>

          <!-- Submit button -->
          <button data-dom-id="btn-change-password" style="display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 16px; border: none; border-radius: var(--radius-md); background-color: var(--color-primary); color: var(--color-primary-foreground); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font-family-base); transition: background-color 120ms cubic-bezier(.2,.8,.2,1);" onmouseover="this.style.backgroundColor='var(--color-primary-hover)';" onmouseout="this.style.backgroundColor='var(--color-primary)';">
            修改密码
          </button>
        </div>

        <!-- Section 3: 登录设备管理 -->
        <div style="background-color: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 24px;">
          <h2 style="font-size: 16px; font-weight: 500; color: var(--color-foreground); line-height: 24px; margin: 0 0 4px 0;">登录设备管理</h2>
          <p style="font-size: 13px; color: var(--color-muted-foreground); line-height: 20px; margin: 0 0 20px 0;">管理您已授权的登录设备和浏览器会话</p>

          <!-- Device list -->
          <div style="display: flex; flex-direction: column;">

            <!-- Device 1: Current device -->
            <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--color-border);">
              <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background-color: var(--color-surface-container); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <i data-lucide="laptop" style="width: 18px; height: 18px; color: var(--color-on-surface-variant);"></i>
              </div>
              <div style="flex: 1; min-width: 0;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
                  <span style="font-size: 13px; font-weight: 500; color: var(--color-foreground);">MacBook Pro</span>
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">Chrome</span>
                  <span style="display: inline-flex; align-items: center; padding: 1px 6px; border-radius: var(--radius-md); font-size: 11px; font-weight: 500; background-color: var(--status-identitySuccess-2); color: var(--color-success);">当前</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">北京</span>
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">2026-06-27 09:15</span>
                </div>
              </div>
            </div>

            <!-- Device 2: iPhone -->
            <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--color-border);">
              <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background-color: var(--color-surface-container); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <i data-lucide="smartphone" style="width: 18px; height: 18px; color: var(--color-on-surface-variant);"></i>
              </div>
              <div style="flex: 1; min-width: 0;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
                  <span style="font-size: 13px; font-weight: 500; color: var(--color-foreground);">iPhone 15</span>
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">Safari</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">上海</span>
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">2026-06-25 18:30</span>
                </div>
              </div>
              <button data-dom-id="btn-remove-iphone" style="font-size: 13px; color: var(--color-danger); background: none; border: none; cursor: pointer; padding: 0 4px; font-family: var(--font-family-base); white-space: nowrap; text-decoration: underline; text-underline-offset: 2px;">移除</button>
            </div>

            <!-- Device 3: Windows PC -->
            <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0;">
              <div style="width: 36px; height: 36px; border-radius: var(--radius-md); background-color: var(--color-surface-container); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <i data-lucide="monitor" style="width: 18px; height: 18px; color: var(--color-on-surface-variant);"></i>
              </div>
              <div style="flex: 1; min-width: 0;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
                  <span style="font-size: 13px; font-weight: 500; color: var(--color-foreground);">Windows PC</span>
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">Edge</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">深圳</span>
                  <span style="font-size: 12px; color: var(--color-muted-foreground);">2026-06-20 14:22</span>
                </div>
              </div>
              <button data-dom-id="btn-remove-windows" style="font-size: 13px; color: var(--color-danger); background: none; border: none; cursor: pointer; padding: 0 4px; font-family: var(--font-family-base); white-space: nowrap; text-decoration: underline; text-underline-offset: 2px;">移除</button>
            </div>

          </div>
        </div>

      </div>

    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
