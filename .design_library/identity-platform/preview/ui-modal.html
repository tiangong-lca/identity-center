<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Modal 模态框</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <style>
    .modal {
      background: #FFFFFF;
      border-radius: 8px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }
    .modal-sm { width: 400px; }
    .modal-md { width: 480px; }
    .modal-lg { width: 640px; }
    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title {
      font-family: "PingFang SC", sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 22px;
      letter-spacing: 0.3px;
      color: #0C0D0E;
    }
    .modal-close {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #737A87;
      transition: background 150ms ease;
    }
    .modal-close:hover { background: #F1F3F5; color: #42464E; }
    .modal-body {
      padding: 16px 24px;
      font-family: "PingFang SC", sans-serif;
      font-size: 14px;
      line-height: 22px;
      color: #42464E;
      overflow-y: auto;
      flex: 1;
    }
    .modal-footer {
      padding: 0 24px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .modal-confirm .modal-confirm-body {
      padding: 24px 24px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .modal-confirm-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-confirm-icon-info { color: #1664FF; }
    .modal-confirm-icon-success { color: #00B365; }
    .modal-confirm-icon-warning { color: #FF7D00; }
    .modal-confirm-icon-danger { color: #F53F3F; }
    .modal-confirm-content { flex: 1; }
    .modal-confirm-title {
      font-family: "PingFang SC", sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 22px;
      letter-spacing: 0.3px;
      color: #0C0D0E;
      margin-bottom: 4px;
    }
    .modal-confirm-desc {
      font-family: "PingFang SC", sans-serif;
      font-size: 14px;
      line-height: 22px;
      color: #737A87;
    }
    .modal-confirm-footer {
      padding: 0 24px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: "PingFang SC", sans-serif;
      font-weight: 500;
      letter-spacing: 0.3px;
      line-height: 22px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms ease, box-shadow 150ms ease, color 150ms ease;
    }
    .btn-md { height: 32px; padding: 0 16px; font-size: 13px; }
    .btn-primary { background: #1664FF; color: #FFFFFF; }
    .btn-primary:hover { background: rgba(22,100,255,0.8); }
    .btn-secondary { background: #F6F8FA; color: #42464E; box-shadow: inset 0 0 0 1px #DDE2E9; }
    .btn-secondary:hover { background: #ECEDED; }
    .btn-danger { background: #F53F3F; color: #FFFFFF; }
    .btn-danger:hover { background: rgba(245,63,63,0.8); }
  </style>
</head>
<body>
  <div class="pv-header">
    <h1>Modal 模态框</h1>
    <p>模态对话框，在不离开当前页面的前提下承载信息确认、表单填写等交互任务。</p>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">Standard 标准型</div>
    <div class="stack-12">
      <div class="modal modal-standard modal-sm" data-component="modal" data-type="standard" data-size="small">
        <div class="modal-header">
          <div class="modal-title">对话框标题</div>
          <button class="modal-close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body">对话框内容区域，可放置文字、表单等任意内容。</div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-md">取消</button>
          <button class="btn btn-primary btn-md">确认</button>
        </div>
      </div>
      <div class="modal modal-standard modal-md" data-component="modal" data-type="standard" data-size="default">
        <div class="modal-header">
          <div class="modal-title">对话框标题</div>
          <button class="modal-close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body">对话框内容区域，可放置文字、表单等任意内容。</div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-md">取消</button>
          <button class="btn btn-primary btn-md">确认</button>
        </div>
      </div>
      <div class="modal modal-standard modal-lg" data-component="modal" data-type="standard" data-size="large">
        <div class="modal-header">
          <div class="modal-title">对话框标题</div>
          <button class="modal-close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body">对话框内容区域，可放置文字、表单等任意内容。</div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-md">取消</button>
          <button class="btn btn-primary btn-md">确认</button>
        </div>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">Confirm 确认型</div>
    <div class="stack-12">
      <div class="modal modal-confirm modal-sm" data-component="modal" data-type="confirm" data-icon="info">
        <div class="modal-confirm-body">
          <div class="modal-confirm-icon modal-confirm-icon-info">
            <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor"/><circle cx="12" cy="8" r="1.25" fill="white"/><rect x="10.75" y="10.5" width="2.5" height="6" rx="1.25" fill="white"/></svg>
          </div>
          <div class="modal-confirm-content">
            <div class="modal-confirm-title">确认执行此操作？</div>
            <div class="modal-confirm-desc">此操作执行后将不可撤销，请确认。</div>
          </div>
        </div>
        <div class="modal-confirm-footer">
          <button class="btn btn-secondary btn-md">取消</button>
          <button class="btn btn-primary btn-md">确认</button>
        </div>
      </div>
      <div class="modal modal-confirm modal-sm" data-component="modal" data-type="confirm" data-icon="success">
        <div class="modal-confirm-body">
          <div class="modal-confirm-icon modal-confirm-icon-success">
            <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor"/><path d="M8 12.5l2.5 2.5 5.5-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
          <div class="modal-confirm-content">
            <div class="modal-confirm-title">操作成功</div>
            <div class="modal-confirm-desc">资源已成功创建并部署。</div>
          </div>
        </div>
        <div class="modal-confirm-footer">
          <button class="btn btn-primary btn-md">知道了</button>
        </div>
      </div>
      <div class="modal modal-confirm modal-sm" data-component="modal" data-type="confirm" data-icon="warning">
        <div class="modal-confirm-body">
          <div class="modal-confirm-icon modal-confirm-icon-warning">
            <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor"/><rect x="10.75" y="7" width="2.5" height="6" rx="1.25" fill="white"/><circle cx="12" cy="16" r="1.25" fill="white"/></svg>
          </div>
          <div class="modal-confirm-content">
            <div class="modal-confirm-title">操作风险提示</div>
            <div class="modal-confirm-desc">该操作可能影响线上服务，请确认后继续。</div>
          </div>
        </div>
        <div class="modal-confirm-footer">
          <button class="btn btn-secondary btn-md">取消</button>
          <button class="btn btn-primary btn-md">继续</button>
        </div>
      </div>
      <div class="modal modal-confirm modal-sm" data-component="modal" data-type="confirm" data-icon="danger">
        <div class="modal-confirm-body">
          <div class="modal-confirm-icon modal-confirm-icon-danger">
            <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor"/><rect x="10.75" y="7" width="2.5" height="6" rx="1.25" fill="white"/><circle cx="12" cy="16" r="1.25" fill="white"/></svg>
          </div>
          <div class="modal-confirm-content">
            <div class="modal-confirm-title">确认删除？</div>
            <div class="modal-confirm-desc">删除后数据无法恢复，请谨慎操作。</div>
          </div>
        </div>
        <div class="modal-confirm-footer">
          <button class="btn btn-secondary btn-md">取消</button>
          <button class="btn btn-danger btn-md">删除</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
