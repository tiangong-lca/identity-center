<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>StatusTag 状态标签</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <style>
    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 20px;
      padding: 0 6px;
      border: 1px solid;
      border-radius: 4px;
      font-size: 12px;
      line-height: 18px;
      font-weight: 400;
      white-space: nowrap;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    }
    .status-tag-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .status-tag-success    { background: #E8FFEA; color: #00B42A; border-color: #AFF0B5; }
    .status-tag-warning    { background: #FFF7E8; color: #FF7D00; border-color: #FFD591; }
    .status-tag-error      { background: #FFECE8; color: #F53F3F; border-color: #FBACA3; }
    .status-tag-stop       { background: #F1F3F5; color: #80838A; border-color: #DDE2E9; }
    .status-tag-processing { background: #EBF1FF; color: #1664FF; border-color: #97BCFF; }
    .status-tag-loading    { background: #EBF1FF; color: #1664FF; border-color: #97BCFF; }
    .status-tag-waiting    { background: #F5E8FF; color: #722ED1; border-color: #C28FEF; }
  </style>
</head>
<body>
  <div class="pv-header">
    <h1>StatusTag 状态标签</h1>
    <p>语义化状态标签，通过彩色图标与背景色快速传达业务状态（成功、告警、错误、停止、进行中等）。</p>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">所有状态</div>
    <div class="row">

        <span class="status-tag-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 -0.5 49 49" fill="none"><path d="M24.214 43.986c11.042 0 19.993-8.95 19.993-19.993C44.207 12.951 35.256 4 24.214 4 13.172 4 4.22 12.951 4.22 23.993c0 11.042 8.95 19.993 19.993 19.993z" fill="#387BFF"/><path fill-rule="evenodd" clip-rule="evenodd" d="M24.214 40.654c9.202 0 16.66-7.46 16.66-16.66 0-9.202-7.459-16.662-16.66-16.662-9.202 0-16.661 7.46-16.661 16.661 0 9.202 7.46 16.661 16.66 16.661zm19.993-16.66c0 11.041-8.951 19.992-19.993 19.992-11.042 0-19.993-8.95-19.993-19.993C4.22 12.951 13.17 4 24.214 4c11.042 0 19.993 8.951 19.993 19.993z" fill="#1664FF"/><path fill-rule="evenodd" clip-rule="evenodd" d="M34.215 24.453v2.222a1.11 1.11 0 01-1.11 1.11h-11.53c-.236 0-.455-.073-.635-.198l-.103-.082-.093-.093a1.106 1.106 0 01-.28-.737V15.107c0-.613.497-1.11 1.11-1.11h2.222c.614 0 1.111.497 1.111 1.11v8.235h8.197c.614 0 1.11.498 1.11 1.111z" fill="#fff"/></svg></span>
