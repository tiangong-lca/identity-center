name: identity-center-prod

# 生产部署(单机 Docker Compose)。所有口令/密钥经 .env.production 注入,镜像内无默认凭据。
# 前置:配置 deploy/env/.env.production(参考 .env.example),HTTPS 由外层反代(Nginx/Caddy)终止。

services:
  portal:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file: ../env/.env.production
    ports:
      - "3000:3000"
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 1g }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: worker
    env_file: ../env/.env.production
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }

  postgres:
    image: postgres:17-alpine
    env_file: ../env/.env.production
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: ["start", "--optimized"]
    env_file: ../env/.env.production
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ../keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP",
        ]
      interval: 15s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  rabbitmq:
    image: rabbitmq:4-management
    env_file: ../env/.env.production
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
